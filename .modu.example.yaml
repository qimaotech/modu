workspace: ~/workspace/main
worktree-root: ~/workspace
default-base: develop
concurrency: 5
auto-fetch: true
strict-dirty-check: true

# 创建 feature 时默认选中的模块（可选）
# default-selected-modules:
#   - frontend
#   - backend

modules:
  - name: frontend
    url: git@github.com:example/frontend.git
  - name: backend
    url: git@github.com:example/backend.git
