version: "3"

tasks:
  default:
    desc: Show help
    cmds:
      - task --list

  install:
    desc: 安装开发工具
    cmds:
      - echo "No extra tools needed"

  # ========== 开发工具 ==========
  test:
    desc: 运行单元测试
    cmds:
      - go test -v ./...

  e2e:
    desc: 运行端到端测试
    cmds:
      - go test -v -tags=e2e -run E2E ./...

  # ========== 构建 ==========
  version:
    desc: 查看版本信息
    cmds:
      - go run ./cmd/modu version

  build:
    desc: 构建项目
    cmds:
      - go build -o bin/modu ./cmd/...

  build-all:
    desc: 构建所有平台版本
    cmds:
      - GOOS=darwin GOARCH=amd64 go build -o bin/modu-darwin-amd64 ./cmd/...
      - GOOS=darwin GOARCH=arm64 go build -o bin/modu-darwin-arm64 ./cmd/...
      - GOOS=linux GOARCH=amd64 go build -o bin/modu-linux-amd64 ./cmd/...

  # ========== standard-version ==========

  # 安装依赖（全局安装）
  install-deps:
    desc: 全局安装 standard-version
    cmds:
      - npm install -g standard-version

  # 发布新版本（自动根据 commit message 判断版本类型）
  # 仅限 master/main 分支执行
  # feat: → minor | fix: → patch | BREAKING CHANGE: → major
  # 程序启动时自动从 git tag 读取版本
  release:
    silent: true
    desc: 自动根据 commit message 发布新版本（仅限 master/main）
    cmds:
      - |
        BRANCH=$(git branch --show-current)
        if [[ "$BRANCH" != "master" && "$BRANCH" != "main" ]]; then
          echo "Error: Release must be run on master or main branch"
          echo "Current branch: $BRANCH"
          exit 1
        fi

        # 执行 standard-version 并创建 tag
        standard-version

  # 查看当前版本
  version:dry-run:
    desc: 查看当前版本
    cmds:
      - standard-version --dry-run

  # ========== Pre-commit ==========
  pre-commit:
    desc: 运行提交前检查
    cmds:
      - task fmt
      - task vet
      - task lint
      - task test

  # ========== 清理 ==========
  clean:
    desc: 清理构建产物
    cmds:
      - rm -rf bin/
      - rm -f coverage.out coverage.html