version: "3"

tasks:
  default:
    desc: Show help
    cmds:
      - task --list

  install:
    desc: 安装开发工具
    cmds:
      - echo "No extra tools needed"

  # ========== 开发工具 ==========
  test:
    desc: 运行单元测试并输出覆盖率
    cmds:
      - go test ./... -coverprofile=coverage.out -covermode=atomic
      - go tool cover -func=coverage.out

  e2e:
    desc: 运行端到端测试
    cmds:
      - go test -v -tags=e2e -run E2E ./...

  # ========== 构建 ==========
  version:
    desc: 查看版本信息
    cmds:
      - go run ./cmd/modu version

  build:
    desc: 构建项目
    cmds:
      - go build -o bin/modu ./cmd/...

  build-all:
    desc: 构建所有平台版本
    cmds:
      - GOOS=darwin GOARCH=amd64 go build -o bin/modu-darwin-amd64 ./cmd/...
      - GOOS=darwin GOARCH=arm64 go build -o bin/modu-darwin-arm64 ./cmd/...
      - GOOS=linux GOARCH=amd64 go build -o bin/modu-linux-amd64 ./cmd/...

  # ========== 发布（GoReleaser） ==========
  # 详见 docs/RELEASE.md；发布前需先打 tag，例如: git tag v1.0.0 && task release
  # 安装 GoReleaser: go install github.com/goreleaser/goreleaser/v2@latest
  release:
    silent: true
    desc: 在 main/master 分支执行 GoReleaser 发布（需已打 tag，设 GITHUB_TOKEN）
    cmds:
      - |
        BRANCH=$(git branch --show-current)
        if [[ "$BRANCH" != "master" && "$BRANCH" != "main" ]]; then
          echo "Error: Release must be run on master or main branch"
          echo "Current branch: $BRANCH"
          exit 1
        fi
        if ! command -v goreleaser >/dev/null 2>&1; then
          echo "GoReleaser not found. Install: go install github.com/goreleaser/goreleaser/v2@latest"
          exit 1
        fi
        goreleaser release

  release:check:
    desc: 检查发布前置条件（分支、tag、GoReleaser、GITHUB_TOKEN）
    cmds:
      - |
        echo "=== Release 前置检查 ==="
        BRANCH=$(git branch --show-current)
        if [[ "$BRANCH" != "master" && "$BRANCH" != "main" ]]; then
          echo "✗ 当前分支 $BRANCH，需在 main 或 master"
        else
          echo "✓ 分支: $BRANCH"
        fi
        TAG=$(git describe --tags --exact-match 2>/dev/null || true)
        if [[ -z "$TAG" ]]; then
          echo "✗ 当前 commit 无 tag，请先: git tag vX.Y.Z && git push origin vX.Y.Z"
        else
          echo "✓ Tag: $TAG"
        fi
        if command -v goreleaser >/dev/null 2>&1; then
          echo "✓ GoReleaser: $(goreleaser --version 2>/dev/null || echo installed)"
        else
          echo "✗ 未安装 GoReleaser: go install github.com/goreleaser/goreleaser/v2@latest"
        fi
        if [[ -n "${GITHUB_TOKEN:-}" ]]; then
          echo "✓ GITHUB_TOKEN 已设置"
        else
          echo "✗ 未设置 GITHUB_TOKEN，发布前请: export GITHUB_TOKEN=ghp_xxx"
        fi
        echo ""
        echo "完整步骤见: docs/RELEASE.md"

  release:snapshot:
    desc: 本地快照构建（不发布），产物在 dist/
    cmds:
      - |
        if ! command -v goreleaser >/dev/null 2>&1; then
          echo "GoReleaser not found. Install: go install github.com/goreleaser/goreleaser/v2@latest"
          exit 1
        fi
        goreleaser build --snapshot --clean

  version:next:
    desc: 显示当前 tag 并提示打 tag 后执行 task release
    cmds:
      - |
        TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        echo "Current tag: $TAG"
        echo "To release: git tag vX.Y.Z && git push origin vX.Y.Z && task release"

  # ========== Pre-commit ==========
  pre-commit:
    desc: 运行提交前检查
    cmds:
      - task fmt
      - task vet
      - task lint
      - task test

  # ========== 清理 ==========
  clean:
    desc: 清理构建产物
    cmds:
      - rm -rf bin/
      - rm -rf dist/
      - rm -f coverage.out coverage.html